<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>📒 我的知识库 · 流水日记</title>
    <style>
        /* ===== 全局重置 & 变量 ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 12px rgba(0,0,0,0.06);
            --radius: 16px;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --radius-sm: 10px;
            --max-width: 720px;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card-bg: #1e293b;
                --text: #f1f5f9;
                --text-secondary: #94a3b8;
                --border: #334155;
                --shadow: 0 4px 12px rgba(0,0,0,0.4);
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px 12px 90px;
            max-width: var(--max-width);
            margin: 0 auto;
            transition: background 0.2s;
        }
        /* ===== 顶部栏 ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            background: var(--card-bg);
            color: var(--text);
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.15s;
            gap: 4px;
            border: 1px solid var(--border);
            touch-action: manipulation;
            user-select: none;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .btn-icon { width: 40px; height: 40px; padding:0; border-radius: 50%; }
        .btn:active { transform: scale(0.96); }

        /* ===== 搜索框 ===== */
        .search-wrap {
            position: relative;
            margin-bottom: 16px;
        }
        .search-wrap input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }
        .search-wrap input:focus { border-color: var(--primary); }
        .search-wrap .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 18px;
        }
        .search-wrap .clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: none;
        }
        .search-wrap .clear-btn.visible { display: block; }

        /* ===== 统计 ===== */
        .stats {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }
        .stats .sync-status {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sync-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            display: inline-block;
        }
        .sync-status .dot.syncing { background: #eab308; animation: pulse 0.8s infinite; }
        .sync-status .dot.error { background: #ef4444; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* ===== 瀑布流卡片 ===== */
        .card-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: transform 0.1s;
            cursor: pointer;
            position: relative;
        }
        .card:active { transform: scale(0.99); }
        .card .number {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .card .title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.4;
            word-break: break-word;
        }
        .card .body-preview {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-word;
        }
        .card .body-preview img {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius-sm);
            margin-top: 8px;
            display: block;
        }
        .card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            padding-top: 10px;
        }
        .card .meta .tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .card .meta .tags span {
            background: var(--bg);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
        }
        .card .actions {
            display: flex;
            gap: 6px;
        }
        .card .actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            transition: background 0.1s;
        }
        .card .actions button:hover { background: var(--border); }
        .card .actions .edit-btn { color: var(--primary); }
        .card .actions .del-btn { color: var(--danger); }

        /* ===== 高亮 ===== */
        .highlight {
            background: #fde047;
            color: #1e293b;
            padding: 0 2px;
            border-radius: 2px;
        }
        @media (prefers-color-scheme: dark) {
            .highlight { background: #a16207; color: #fef9c3; }
        }

        /* ===== 空状态 ===== */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty .big { font-size: 48px; margin-bottom: 12px; }

        /* ===== 加载更多 ===== */
        .load-more {
            text-align: center;
            padding: 16px 0;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .load-more .btn { width: 100%; }

        /* ===== 弹窗 (Modal) ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 999;
            padding: 16px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--card-bg);
            border-radius: var(--radius) var(--radius) 0 0;
            max-width: 680px;
            width: 100%;
            max-height: 92vh;
            padding: 24px 20px 30px;
            overflow-y: auto;
            animation: slideUp 0.25s ease-out;
            border: 1px solid var(--border);
        }
        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .modal .modal-header h2 { font-size: 20px; }
        .modal .modal-header .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0 8px;
        }
        .modal .field-group {
            margin-bottom: 14px;
        }
        .modal .field-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .modal .field-group input,
        .modal .field-group textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            transition: border 0.2s;
            outline: none;
        }
        .modal .field-group input:focus,
        .modal .field-group textarea:focus { border-color: var(--primary); }
        .modal .field-group textarea { min-height: 100px; resize: vertical; }
        .modal .field-group .img-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }
        .modal .field-group .img-preview img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }
        .modal .field-group .img-upload-btn {
            display: inline-block;
            padding: 8px 16px;
            border: 1px dashed var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            background: var(--bg);
            transition: 0.15s;
        }
        .modal .field-group .img-upload-btn:hover { border-color: var(--primary); color: var(--primary); }
        .modal .field-group .img-upload-btn input { display: none; }
        .modal .field-group .remove-img {
            color: var(--danger);
            font-size: 12px;
            cursor: pointer;
            margin-left: 8px;
        }
        .modal .modal-footer {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .modal .modal-footer .btn { flex: 1; min-width: 80px; }

        /* ===== 首次配置弹窗 ===== */
        .config-modal .modal { border-radius: var(--radius); max-width: 480px; }
        .config-modal .modal .hint {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.6;
        }
        .config-modal .modal .hint a { color: var(--primary); }

        /* ===== 手机适配 ===== */
        @media (max-width: 480px) {
            body { padding: 12px 8px 80px; }
            .header h1 { font-size: 19px; }
            .btn { font-size: 12px; padding: 6px 12px; }
            .card { padding: 14px; }
            .card .title { font-size: 16px; }
        }
    </style>
</head>
<body>

<!-- ===== 顶部 ===== -->
<div class="header">
    <h1>📒 流水日记</h1>
    <div class="header-actions">
        <button class="btn btn-primary" id="newBtn">＋ 新建</button>
        <button class="btn" id="syncBtn" title="手动同步">🔄</button>
        <button class="btn" id="exportBtn" title="导出备份">💾</button>
        <button class="btn" id="configBtn" title="设置">⚙️</button>
    </div>
</div>

<!-- ===== 搜索 ===== -->
<div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索所有记录...">
    <button class="clear-btn" id="clearSearch">✕</button>
</div>

<!-- ===== 统计 & 同步状态 ===== -->
<div class="stats">
    <span id="countDisplay">共 0 条</span>
    <span class="sync-status" id="syncStatus">
        <span class="dot" id="syncDot"></span>
        <span id="syncLabel">就绪</span>
    </span>
</div>

<!-- ===== 卡片列表 ===== -->
<div class="card-grid" id="cardGrid">
    <div class="empty"><div class="big">📭</div><p>还没有记录，点「新建」写第一条吧</p></div>
</div>

<!-- ===== 加载更多 ===== -->
<div class="load-more" id="loadMoreWrap" style="display:none;">
    <button class="btn" id="loadMoreBtn">加载更多</button>
</div>

<!-- ===== 新建/编辑 弹窗 ===== -->
<div class="modal-overlay" id="editorModal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="editorTitle">新建记录</h2>
            <button class="close-btn" id="editorClose">✕</button>
        </div>
        <div class="field-group">
            <label>📝 正文内容 <span style="font-weight:400;color:var(--text-secondary);">(支持纯文本，首行为标题)</span></label>
            <textarea id="editorBody" placeholder="写点什么...&#10;第二行开始是详细内容"></textarea>
        </div>
        <div class="field-group">
            <label>🖼️ 图片</label>
            <div class="img-upload-btn">
                ＋ 选择图片 (自动压缩)
                <input type="file" id="editorImageInput" accept="image/*" capture="environment">
            </div>
            <div class="img-preview" id="editorImagePreview"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-danger" id="editorDeleteBtn" style="display:none;">删除</button>
            <button class="btn btn-primary" id="editorSaveBtn">保存</button>
            <button class="btn" id="editorCancelBtn">取消</button>
        </div>
    </div>
</div>

<!-- ===== 首次配置弹窗 ===== -->
<div class="modal-overlay config-modal" id="configModal">
    <div class="modal">
        <div class="modal-header">
            <h2>⚙️ 云端同步配置</h2>
            <button class="close-btn" id="configClose">✕</button>
        </div>
        <div class="hint">
            <p>使用 GitHub Gist 实现多设备同步。需要 <a href="https://github.com/settings/tokens" target="_blank">创建个人访问令牌</a>（勾选 <strong>gist</strong> 权限）。</p>
            <p>已有 Gist ID 可填入，留空则自动创建。</p>
        </div>
        <div class="field-group">
            <label>🔑 GitHub Token</label>
            <input type="password" id="configToken" placeholder="ghp_xxxxxxxxxxxx">
        </div>
        <div class="field-group">
            <label>📄 Gist ID (可选)</label>
            <input type="text" id="configGistId" placeholder="留空自动创建">
        </div>
        <div class="modal-footer">
            <button class="btn btn-primary" id="configSaveBtn">绑定并同步</button>
            <button class="btn" id="configSkipBtn">仅本地使用</button>
        </div>
    </div>
</div>

<script>
// ============================================================
//  核心代码 — 全部自包含
// ============================================================

// ---------- 工具函数 ----------
const $ = id => document.getElementById(id);
const $$ = sel => document.querySelectorAll(sel);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

// 日期格式化
function formatTime(ts) {
    const d = new Date(ts);
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

// 压缩图片 (宽800, 质量0.8)
function compressImage(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const maxW = 800;
                let w = img.width, h = img.height;
                if (w > maxW) { h = h * maxW / w; w = maxW; }
                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', 0.8));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

// ---------- 数据层 (IndexedDB) ----------
const DB_NAME = 'FlowNoteDB';
const STORE_NAME = 'records';
let db = null;

function openDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = (ev) => {
            const d = ev.target.result;
            if (!d.objectStoreNames.contains(STORE_NAME)) {
                const store = d.createObjectStore(STORE_NAME, { keyPath: 'id' });
                store.createIndex('createdAt', 'createdAt');
            }
        };
        req.onsuccess = (ev) => { db = ev.target.result; resolve(db); };
        req.onerror = (ev) => reject(ev.target.error);
    });
}

function getAllRecords() {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
    });
}

function saveRecords(records) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        store.clear();
        records.forEach(r => store.put(r));
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
    });
}

function putRecord(record) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const req = store.put(record);
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
    });
}

function deleteRecord(id) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const req = store.delete(id);
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
    });
}

// ---------- 全局状态 ----------
let allRecords = [];           // 全部记录 (按创建时间倒序)
let displayedRecords = [];     // 当前展示的分页记录
let currentPage = 0;
const PAGE_SIZE = 20;
let searchKeyword = '';
let isEditMode = false;
let editingId = null;
let currentImageData = null;   // 编辑器中暂存的图片base64

// 配置
let config = { token: '', gistId: '' };
let isSyncing = false;
let lastSyncTime = 0;

// ---------- 加载配置 ----------
function loadConfig() {
    try {
        const raw = localStorage.getItem('flownote_config');
        if (raw) { config = JSON.parse(raw); }
    } catch(e) {}
    if (!config.token && !config.gistId) {
        // 首次使用，显示配置弹窗
        setTimeout(() => $('configModal').classList.add('active'), 300);
    }
}

function saveConfigToLocal(cfg) {
    config = cfg;
    localStorage.setItem('flownote_config', JSON.stringify(cfg));
}

// ---------- 同步 (GitHub Gist) ----------
function getGistUrl(gistId) {
    return `https://api.github.com/gists/${gistId}`;
}

async function fetchFromGist() {
    if (!config.token || !config.gistId) return null;
    const url = getGistUrl(config.gistId);
    const resp = await fetch(url, {
        headers: { 'Authorization': `Bearer ${config.token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!resp.ok) throw new Error(`Gist 获取失败 (${resp.status})`);
    const data = await resp.json();
    const files = data.files;
    if (!files || !files['flownote_data.json']) return null;
    const content = files['flownote_data.json'].content;
    return JSON.parse(content);
}

async function pushToGist(records) {
    if (!config.token || !config.gistId) return;
    const url = getGistUrl(config.gistId);
    const payload = {
        files: {
            'flownote_data.json': {
                content: JSON.stringify(records, null, 2)
            }
        }
    };
    const resp = await fetch(url, {
        method: 'PATCH',
        headers: {
            'Authorization': `Bearer ${config.token}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
    });
    if (!resp.ok) throw new Error(`Gist 推送失败 (${resp.status})`);
    return await resp.json();
}

async function createGist(records) {
    if (!config.token) throw new Error('Token 不能为空');
    const payload = {
        description: '流水日记知识库',
        public: false,
        files: {
            'flownote_data.json': {
                content: JSON.stringify(records, null, 2)
            }
        }
    };
    const resp = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: {
            'Authorization': `Bearer ${config.token}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
    });
    if (!resp.ok) throw new Error(`创建 Gist 失败 (${resp.status})`);
    const data = await resp.json();
    return data.id;
}

// 同步主函数: 拉取云端并合并 (以时间戳最新的为准)
async function syncWithCloud(showToast = true) {
    if (isSyncing) return;
    if (!config.token) {
        $('configModal').classList.add('active');
        return;
    }
    isSyncing = true;
    updateSyncUI('syncing', '同步中...');
    try {
        // 1. 先拉取本地
        const local = allRecords.slice();
        // 2. 拉取云端
        let cloud = null;
        let cloudGistId = config.gistId;
        if (!cloudGistId) {
            // 没有gistId，则创建
            const newId = await createGist(local.length ? local : []);
            cloudGistId = newId;
            saveConfigToLocal({ ...config, gistId: cloudGistId });
            updateSyncUI('ok', '已创建云端');
            if (showToast) showToast('✅ 云端已创建');
            isSyncing = false;
            return;
        }
        cloud = await fetchFromGist();
        if (!cloud) {
            // gist存在但无文件，推送本地
            await pushToGist(local);
            updateSyncUI('ok', '已同步');
            if (showToast) showToast('✅ 同步完成');
            isSyncing = false;
            return;
        }
        // 3. 合并: 以id为键, 取updatedAt最新者
        const map = new Map();
        local.forEach(r => map.set(r.id, r));
        cloud.forEach(r => {
            const existing = map.get(r.id);
            if (!existing || (r.updatedAt || 0) > (existing.updatedAt || 0)) {
                map.set(r.id, r);
            }
        });
        const merged = Array.from(map.values());
        // 按创建时间降序
        merged.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
        // 4. 存本地
        await saveRecords(merged);
        allRecords = merged;
        // 5. 推回云端 (确保云端最新)
        await pushToGist(merged);
        lastSyncTime = Date.now();
        updateSyncUI('ok', '已同步');
        if (showToast) showToast('✅ 同步完成');
        // 刷新界面
        currentPage = 0;
        searchKeyword = $('searchInput').value.trim();
        render();
    } catch (err) {
        console.error(err);
        updateSyncUI('error', '同步失败');
        if (showToast) showToast('❌ 同步失败: ' + err.message);
    }
    isSyncing = false;
}

function updateSyncUI(state, label) {
    const dot = $('syncDot');
    const lbl = $('syncLabel');
    dot.className = 'dot';
    if (state === 'syncing') { dot.classList.add('syncing'); lbl.textContent = label || '同步中...'; }
    else if (state === 'error') { dot.classList.add('error'); lbl.textContent = label || '错误'; }
    else { lbl.textContent = label || '就绪'; }
}

// ---------- 渲染引擎 ----------
function render() {
    // 过滤
    let filtered = allRecords.slice();
    if (searchKeyword.trim()) {
        const kw = searchKeyword.trim().toLowerCase();
        filtered = filtered.filter(r => {
            const body = (r.body || '') + (r.image ? ' ' : '');
            return body.toLowerCase().includes(kw);
        });
    }
    // 分页
    const total = filtered.length;
    const start = currentPage * PAGE_SIZE;
    const end = Math.min(start + PAGE_SIZE, total);
    const pageItems = filtered.slice(start, end);
    displayedRecords = pageItems;

    // 更新计数
    $('countDisplay').textContent = `共 ${total} 条` + (searchKeyword.trim() ? ` (筛选)` : '');

    const grid = $('cardGrid');
    if (total === 0) {
        grid.innerHTML = `<div class="empty"><div class="big">📭</div><p>${searchKeyword.trim() ? '没有匹配的记录' : '还没有记录，点「新建」写第一条吧'}</p></div>`;
        $('loadMoreWrap').style.display = 'none';
        return;
    }

    let html = '';
    // 计算序号: 全局倒序索引 + 1
    for (let i = 0; i < pageItems.length; i++) {
        const r = pageItems[i];
        // 全局序号: 在allRecords中的倒序索引
        const globalIdx = allRecords.findIndex(item => item.id === r.id);
        const number = globalIdx >= 0 ? globalIdx + 1 : i + 1;
        const title = extractTitle(r.body);
        const preview = extractPreview(r.body, searchKeyword.trim());
        const imgHtml = r.image ? `<img src="${r.image}" alt="图片" loading="lazy">` : '';
        const time = formatTime(r.createdAt);

        html += `
            <div class="card" data-id="${r.id}">
                <div class="number">#${String(number).padStart(3,'0')} · ${time}</div>
                <div class="title">${highlightText(title, searchKeyword.trim())}</div>
                <div class="body-preview">${highlightText(preview, searchKeyword.trim())} ${imgHtml}</div>
                <div class="meta">
                    <span></span>
                    <div class="actions">
                        <button class="edit-btn" data-id="${r.id}">✏️</button>
                        <button class="del-btn" data-id="${r.id}">🗑️</button>
                    </div>
                </div>
            </div>
        `;
    }
    grid.innerHTML = html;

    // 加载更多
    const hasMore = end < total;
    $('loadMoreWrap').style.display = hasMore ? 'block' : 'none';

    // 事件绑定 (卡片点击编辑, 按钮事件)
    grid.querySelectorAll('.card').forEach(el => {
        const id = el.dataset.id;
        el.addEventListener('click', (e) => {
            // 如果点击的是按钮，不触发
            if (e.target.closest('button')) return;
            openEditor(id);
        });
    });
    grid.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); openEditor(btn.dataset.id); });
    });
    grid.querySelectorAll('.del-btn').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); deleteRecordById(btn.dataset.id); });
    });
}

// 提取标题 (第一行)
function extractTitle(body) {
    if (!body) return '无标题';
    const lines = body.split('\n');
    return lines[0].trim() || '无标题';
}
// 提取预览 (去除标题后最多100字)
function extractPreview(body, keyword) {
    if (!body) return '';
    const lines = body.split('\n');
    const rest = lines.slice(1).join(' ').trim();
    if (!rest) return '（仅标题）';
    return rest.length > 120 ? rest.slice(0,120) + '...' : rest;
}
// 高亮
function highlightText(text, keyword) {
    if (!keyword || !text) return escapeHtml(text);
    const kw = keyword.trim();
    if (!kw) return escapeHtml(text);
    const escaped = escapeHtml(text);
    const regex = new RegExp(escapeRegex(kw), 'gi');
    return escaped.replace(regex, match => `<span class="highlight">${match}</span>`);
}
function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}
function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ---------- 打开编辑器 ----------
async function openEditor(id = null) {
    isEditMode = false;
    editingId = null;
    currentImageData = null;
    $('editorTitle').textContent = '新建记录';
    $('editorBody').value = '';
    $('editorImagePreview').innerHTML = '';
    $('editorDeleteBtn').style.display = 'none';
    $('editorImageInput').value = '';

    if (id) {
        const record = allRecords.find(r => r.id === id);
        if (!record) return;
        isEditMode = true;
        editingId = id;
        $('editorTitle').textContent = '编辑记录';
        $('editorBody').value = record.body || '';
        if (record.image) {
            currentImageData = record.image;
            $('editorImagePreview').innerHTML = `<img src="${record.image}" alt="图片"><span class="remove-img" id="removeImgBtn">✕ 移除</span>`;
            document.getElementById('removeImgBtn')?.addEventListener('click', () => {
                currentImageData = null;
                $('editorImagePreview').innerHTML = '';
            });
        }
        $('editorDeleteBtn').style.display = 'inline-flex';
    }
    $('editorModal').classList.add('active');
}

// 关闭编辑器
function closeEditor() {
    $('editorModal').classList.remove('active');
    $('editorImageInput').value = '';
}

// ---------- 保存记录 ----------
async function saveRecordFromEditor() {
    const body = $('editorBody').value.trim();
    if (!body) { showToast('⚠️ 正文不能为空'); return; }

    let record;
    if (isEditMode && editingId) {
        const old = allRecords.find(r => r.id === editingId);
        if (!old) return;
        record = {
            ...old,
            body: body,
            image: currentImageData || '',
            updatedAt: Date.now()
        };
    } else {
        record = {
            id: uid(),
            body: body,
            image: currentImageData || '',
            createdAt: Date.now(),
            updatedAt: Date.now()
        };
    }

    // 存本地
    await putRecord(record);
    // 更新内存
    const idx = allRecords.findIndex(r => r.id === record.id);
    if (idx >= 0) allRecords[idx] = record;
    else allRecords.push(record);
    allRecords.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));

    closeEditor();
    currentPage = 0;
    render();
    // 自动同步到云端
    if (config.token && config.gistId) {
        try { await pushToGist(allRecords); updateSyncUI('ok','已同步'); } catch(e) { updateSyncUI('error','同步失败'); }
    }
    showToast('✅ 已保存');
}

// ---------- 删除记录 ----------
async function deleteRecordById(id) {
    if (!confirm('确定删除这条记录吗？')) return;
    await deleteRecord(id);
    allRecords = allRecords.filter(r => r.id !== id);
    currentPage = 0;
    render();
    if (config.token && config.gistId) {
        try { await pushToGist(allRecords); } catch(e) {}
    }
    showToast('🗑️ 已删除');
}

// ---------- Toast 轻提示 ----------
function showToast(msg) {
    let toast = document.getElementById('toast');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.style.cssText = `
            position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,0.8); color:#fff; padding:10px 24px;
            border-radius:30px; font-size:14px; z-index:9999;
            max-width:90%; text-align:center; transition: opacity 0.3s;
            opacity:0; pointer-events:none; backdrop-filter:blur(4px);
        `;
        document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.style.opacity = '1';
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => { toast.style.opacity = '0'; }, 2500);
}

// ---------- 导出/导入 ----------
function exportData() {
    const data = JSON.stringify(allRecords, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `flownote_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    showToast('💾 导出成功');
}

function importData(file) {
    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            const data = JSON.parse(e.target.result);
            if (!Array.isArray(data)) throw new Error('格式错误');
            await saveRecords(data);
            allRecords = data;
            allRecords.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
            currentPage = 0;
            render();
            if (config.token && config.gistId) {
                await pushToGist(allRecords);
            }
            showToast('📥 导入成功');
        } catch(err) {
            showToast('❌ 导入失败: ' + err.message);
        }
    };
    reader.readAsText(file);
}

// ---------- 事件绑定 ----------
function initEvents() {
    // 新建
    $('newBtn').addEventListener('click', () => openEditor(null));

    // 编辑器
    $('editorClose').addEventListener('click', closeEditor);
    $('editorCancelBtn').addEventListener('click', closeEditor);
    $('editorSaveBtn').addEventListener('click', saveRecordFromEditor);
    $('editorDeleteBtn').addEventListener('click', async () => {
        if (editingId) await deleteRecordById(editingId);
        closeEditor();
    });
    // 点击遮罩关闭
    $('editorModal').addEventListener('click', (e) => {
        if (e.target === $('editorModal')) closeEditor();
    });

    // 图片上传
    $('editorImageInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
            const compressed = await compressImage(file);
            currentImageData = compressed;
            $('editorImagePreview').innerHTML = `<img src="${compressed}" alt="图片"><span class="remove-img" id="removeImgBtn">✕ 移除</span>`;
            document.getElementById('removeImgBtn')?.addEventListener('click', () => {
                currentImageData = null;
                $('editorImagePreview').innerHTML = '';
            });
        } catch(err) {
            showToast('❌ 图片压缩失败');
        }
        e.target.value = '';
    });

    // 搜索
    const searchInput = $('searchInput');
    const clearBtn = $('clearSearch');
    searchInput.addEventListener('input', () => {
        searchKeyword = searchInput.value.trim();
        clearBtn.classList.toggle('visible', searchInput.value.length > 0);
        currentPage = 0;
        render();
    });
    clearBtn.addEventListener('click', () => {
        searchInput.value = '';
        searchKeyword = '';
        clearBtn.classList.remove('visible');
        currentPage = 0;
        render();
    });

    // 加载更多
    $('loadMoreBtn').addEventListener('click', () => {
        currentPage++;
        render();
        // 滚动到新加载区域
        const grid = $('cardGrid');
        const lastCard = grid.lastElementChild;
        if (lastCard) lastCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });

    // 同步
    $('syncBtn').addEventListener('click', () => syncWithCloud(true));

    // 导出
    $('exportBtn').addEventListener('click', exportData);
    // 导入 (隐藏input)
    const importInput = document.createElement('input');
    importInput.type = 'file';
    importInput.accept = 'application/json';
    importInput.style.display = 'none';
    document.body.appendChild(importInput);
    $('exportBtn').addEventListener('contextmenu', (e) => {
        e.preventDefault();
        importInput.click();
    });
    importInput.addEventListener('change', (e) => {
        if (e.target.files[0]) importData(e.target.files[0]);
        e.target.value = '';
    });
    // 提示：长按导出按钮可导入
    $('exportBtn').title = '单击导出，长按导入';

    // 配置
    $('configBtn').addEventListener('click', () => {
        $('configToken').value = config.token || '';
        $('configGistId').value = config.gistId || '';
        $('configModal').classList.add('active');
    });
    $('configClose').addEventListener('click', () => $('configModal').classList.remove('active'));
    $('configModal').addEventListener('click', (e) => {
        if (e.target === $('configModal')) $('configModal').classList.remove('active');
    });
    $('configSaveBtn').addEventListener('click', async () => {
        const token = $('configToken').value.trim();
        const gistId = $('configGistId').value.trim();
        if (!token) { showToast('⚠️ 请输入 Token'); return; }
        const newConfig = { token, gistId };
        saveConfigToLocal(newConfig);
        $('configModal').classList.remove('active');
        showToast('⏳ 正在同步...');
        await syncWithCloud(true);
    });
    $('configSkipBtn').addEventListener('click', () => {
        $('configModal').classList.remove('active');
        showToast('📁 仅本地模式');
    });
}

// ---------- 初始化 ----------
async function init() {
    await openDB();
    loadConfig();

    // 加载本地数据
    try {
        const records = await getAllRecords();
        if (records && records.length) {
            records.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
            allRecords = records;
        } else {
            allRecords = [];
        }
    } catch(e) {
        allRecords = [];
    }

    // 如果有配置且gistId存在，尝试拉取云端
    if (config.token && config.gistId) {
        try {
            const cloud = await fetchFromGist();
            if (cloud && cloud.length) {
                // 合并
                const map = new Map();
                allRecords.forEach(r => map.set(r.id, r));
                cloud.forEach(r => {
                    const existing = map.get(r.id);
                    if (!existing || (r.updatedAt || 0) > (existing.updatedAt || 0)) {
                        map.set(r.id, r);
                    }
                });
                const merged = Array.from(map.values());
                merged.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
                await saveRecords(merged);
                allRecords = merged;
                updateSyncUI('ok', '已同步');
            }
        } catch(e) {
            updateSyncUI('error', '拉取失败');
        }
    } else if (config.token && !config.gistId) {
        // 有token无gistId，自动创建
        try {
            const newId = await createGist(allRecords);
            saveConfigToLocal({ ...config, gistId: newId });
            updateSyncUI('ok', '已创建云端');
        } catch(e) {
            updateSyncUI('error', '创建失败');
        }
    }

    initEvents();
    render();
    // 自动同步一次（若有配置）
    if (config.token && config.gistId) {
        setTimeout(() => syncWithCloud(false), 1000);
    }
}

// 启动
init();
</script>
